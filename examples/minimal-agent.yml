# Minimal agent spec — a single-purpose coding assistant.
# Uses Kiln's default harness. No custom code needed.

name: assistant
identity_doc: identity.md
model: claude-sonnet-4-6

# Uses Kiln's default tool set:
#   Kiln::{Bash, Read, Write, Edit, Message, Plan, ExitSession, ActivateSkill}
# plus every shell tool discovered under <home>/tools/ (core + library).
#
# Uncomment and narrow if you want a smaller built-in surface:
# tools:
#   - Kiln::Bash
#   - Kiln::Read
#   - Kiln::Write
#   - Kiln::Edit
