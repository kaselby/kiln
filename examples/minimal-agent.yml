# Minimal agent spec — a simple coding assistant
# Uses kiln defaults for everything except identity

name: assistant
identity_doc: identity.md
model: claude-sonnet-4-6

# Uses kiln's default tool set (all Kiln:: tools + Base::Read + Base::WebSearch)
# Uncomment to customize:
# tools:
#   - Base::Read
#   - Base::WebSearch
#   - Kiln::Bash
#   - Kiln::Read
#   - Kiln::Write
#   - Kiln::Edit

hooks:
  inbox_check: {}
  context_warning:
    max_tokens: 200000
